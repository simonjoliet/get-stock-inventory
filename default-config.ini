[selenium]
timeout_seconds = 15
start_maximized = true
disable_automation_controlled = true

[scraping]
max_retries = 3
retry_delay_seconds = 2
page_delay_seconds = 2
page_load_wait_seconds = 3

[shutterstock]
username = shutterstock_login
password = password
portfolio_url = https://submit.shutterstock.com/portfolio/published/photo?sortOrder=newest&page={page}
login_page_wait_seconds = 3
post_login_wait_seconds = 5

[adobe]
username = adobe_google_account
portfolio_url = https://contributor.stock.adobe.com/en/portfolio?limit=100&page={page}&sort_by=create_desc
login_page_wait_seconds = 3
google_continue_timeout_seconds = 5

[set_inventory]
portfolio_url = https://contributor.stock.adobe.com/en/portfolio
asset_search_wait_seconds = 3
reveal_edit_wait_seconds = 1
edit_input_wait_seconds = 1
between_assets_wait_seconds = 2
